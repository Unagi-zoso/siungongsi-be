name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches:
      - AhnSunday-dev-deploy

jobs:
  deploy-to-eb:
    name: Build → Push ECR → Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest

    env:
      ECR_IMAGE: ${{ secrets.ECR_REGISTRY }}/siungongsi
      EB_APP_NAME: dev-siungongsi
      EB_ENV_NAME: Dev-siungongsi-env
      S3_BUCKET: ${{ secrets.EB_S3_BUCKET }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Generate Version Tag
        run: echo "VERSION_TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          docker build --build-arg SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
            -f Dockerfile-eb \
            -t $ECR_IMAGE:latest-backend .
          docker tag $ECR_IMAGE:latest-backend $ECR_IMAGE:${{ env.VERSION_TAG }}-backend
          docker push $ECR_IMAGE:latest-backend
          docker push $ECR_IMAGE:${{ env.VERSION_TAG }}-backend

      - name: Create Dockerrun.aws.json
        run: |
          echo '{
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "'$ECR_IMAGE':latest-backend",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": "8080"
              }
            ]
          }' > Dockerrun.aws.json

      - name: Zip for Beanstalk
        run: zip -r deploy.zip Dockerrun.aws.json .platform
        
      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://$S3_BUCKET/deploy-${{ env.VERSION_TAG }}.zip

      - name: Create EB Application Version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name $EB_APP_NAME \
            --version-label ${{ env.VERSION_TAG }} \
            --source-bundle S3Bucket=$S3_BUCKET,S3Key=deploy-${{ env.VERSION_TAG }}.zip

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name $EB_ENV_NAME \
            --version-label ${{ env.VERSION_TAG }}
