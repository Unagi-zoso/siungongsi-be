name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - AhnSunday-dev-deploy  # develop 브랜치 푸시 시 실행

jobs:
  build-and-push-backend:
    name: Build and Push Backend Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
            distribution: 'temurin'
            java-version: '21'
      
      - name: Fix Code Formatting
        run: ./gradlew spotlessApply

      - name: Set Environment Variables
        run: echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> $GITHUB_ENV

      - name: Build Spring Boot JAR
        env:
            SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }} 
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Configure AWS Credentials
        run: |
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set region ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Set Version Tag
        run: echo "VERSION_TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build Backend Docker Image
        run: |
            docker build -t ${{ secrets.ECR_REGISTRY }}/siungongsi:latest-backend .
            docker tag ${{ secrets.ECR_REGISTRY }}/siungongsi:latest-backend \
            ${{ secrets.ECR_REGISTRY }}/siungongsi:${{ env.VERSION_TAG }}-backend

      - name: Push Backend Docker Image
        run: |
            docker push ${{ secrets.ECR_REGISTRY }}/siungongsi:latest-backend
            docker push ${{ secrets.ECR_REGISTRY }}/siungongsi:${{ env.VERSION_TAG }}-backend

  deploy:
    name: Deploy to EC2
    needs: [build-and-push-backend]
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ubuntu
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
                echo "Pulling latest images..."
                aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

                docker pull ${{ secrets.ECR_REGISTRY }}/siungongsi:latest-backend

                echo "Stopping and removing old containers..."
                docker stop siungongsi-backend || true
                docker rm siungongsi-backend || true

                echo "Running new backend container..."
                docker run -d --name siungongsi-backend -p 8080:8080 \
                    --restart always \
                    -e TZ=Asia/Seoul \
                    -e DB_HOST=${{ secrets.DB_HOST }} \
                    -e DB_PORT=${{ secrets.DB_PORT }} \
                    -e DB_USER=${{ secrets.DB_USER }} \
                    -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
                    -e DB_DATABASE=${{ secrets.DB_DATABASE }} \
                    -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
                    -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
                    -e AWS_REGION=${{ secrets.AWS_REGION }} \
                    -e SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
                    -e SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
                    -e OPENDART_API_KEY=${{ secrets.OPENDART_API_KEY }} \
                    -e GOOGLE_AI_API_KEY=${{ secrets.GOOGLE_AI_API_KEY }} \
                    -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
                    -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
                    -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
                    -e AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }} \
                    -e AWS_SQS_QUEUE_NAME=${{ secrets.AWS_SQS_QUEUE_NAME }} \
                    -e AWS_SQS_QUEUE_URL=${{ secrets.AWS_SQS_QUEUE_URL }} \
                    -e KOREAN_INVESTMENT_APPKEY=${{ secrets.KOREAN_INVESTMENT_APPKEY }} \
                    -e KOREAN_INVESTMENT_SECRETKEY=${{ secrets.KOREAN_INVESTMENT_SECRETKEY }} \
                    -e ADMIN_KEY=${{ secrets.ADMIN_KEY }} \
                    ${{ secrets.ECR_REGISTRY }}/siungongsi:latest-backend
