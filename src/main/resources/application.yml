spring:
  application:
    name: siungongsi

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
      hibernate:
        ddl-auto: none
      show-sql: false
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialect

  doc:
    swagger-ui:
      enabled: true
      path: /swagger-ui  # Swagger UI 경로 변경
    api-docs:
      enabled: true
      path: /v3/api-docs  # API 문서 경로 설정

sentry:
  dsn: ${SENTRY_DSN:}
  tracesSampleRate: 1.0 # 1.0 = 100% 트레이스 샘플링 (0.1 = 10%)
  environment: develop
  release: dev-siungongsi-be