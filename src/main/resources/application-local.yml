spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

sentry:
  enabled: false

doc:
  swagger-ui:
    enabled: true
    path: /swagger-ui
  api-docs:
    enabled: true
    path: /v3/api-docs

korean:
  investment:
    appkey: ${KOREAN_INVESTMENT_APPKEY}
    secretkey: ${KOREAN_INVESTMENT_SECRETKEY}
    token:
      url: https://openapi.koreainvestment.com:9443/oauth2/tokenP
    stock:
      url: https://openapi.koreainvestment.com:9443/uapi/domestic-stock/v1/quotations/inquire-price

jwt:
  secret-key: dflknlsdfjlskfncdsjlkmxnfjsklcxmvnfddddddddc
  expiration-time: 604800000

management:
  endpoints:
    web:
      exposure:
        include: "*"
    health:
        showDetails: always
  health:
    circuitbreakers:
      enabled: true

