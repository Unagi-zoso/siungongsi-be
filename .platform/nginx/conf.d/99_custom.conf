upstream backend {
    server 127.0.0.1:80;
    keepalive 256;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://localhost;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://localhost/health;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
    }
}
